- id: '1776365722855'
  alias: Riego Hidropónico - Fase 1 Trasplante
  description: Ciclos adaptativos según franja horaria y condiciones meteorológicas
  triggers:
  - trigger: time
    at:
      - "08:00"
      - "08:30"
      - "09:00"
      - "09:30"
      - "10:00"
      - "10:30"
      - "11:00"
      - "11:30"
      - "12:00"
      - "12:30"
      - "13:00"
      - "13:30"
      - "14:00"
      - "14:45"
      - "15:30"
      - "16:15"
      - "17:00"
      - "17:45"
      - "18:30"
      - "19:15"
      - "20:00"
      - "22:00"
      - "00:00"
      - "02:00"
      - "04:00"
      - "06:00"
  actions:
  - choose:
    - conditions:
      - condition: time
        after: "08:00:00"
        before: "14:01:00"
      sequence:
      - condition: numeric_state
        entity_id: sensor.humedad_malaga
        below: 80
      - variables:
          minutos_riego: >
            {% set temp = states('sensor.temperatura_malaga') | float(20) %}
            {% if temp > 28 %}3{% elif temp < 18 %}1{% else %}2{% endif %}
      - target:
          entity_id: switch.enchufe_riego_enchufe_1
        action: switch.turn_on
      - delay:
          minutes: "{{ minutos_riego }}"
      - target:
          entity_id: switch.enchufe_riego_enchufe_1
        action: switch.turn_off
    - conditions:
      - condition: time
        after: "14:00:00"
        before: "20:01:00"
      sequence:
      - condition: numeric_state
        entity_id: sensor.humedad_malaga
        below: 80
      - variables:
          minutos_riego: >
            {% set temp = states('sensor.temperatura_malaga') | float(20) %}
            {% if temp > 28 %}3{% elif temp < 18 %}1{% else %}2{% endif %}
      - target:
          entity_id: switch.enchufe_riego_enchufe_1
        action: switch.turn_on
      - delay:
          minutes: "{{ minutos_riego }}"
      - target:
          entity_id: switch.enchufe_riego_enchufe_1
        action: switch.turn_off
    - conditions:
      - condition: time
        after: "20:00:00"
        before: "08:01:00"
      sequence:
      - target:
          entity_id: switch.enchufe_riego_enchufe_1
        action: switch.turn_on
      - delay:
          minutes: 1
      - target:
          entity_id: switch.enchufe_riego_enchufe_1
        action: switch.turn_off
  mode: single

- id: 'alerta_sensor_tiempo_caido'
  alias: Alerta - Sensor del tiempo no disponible
  description: Notifica por email si los sensores de Open-Meteo dejan de responder
  triggers:
  - trigger: state
    entity_id: sensor.temperatura_malaga
    to: "unavailable"
    for:
      minutes: 30
  - trigger: state
    entity_id: sensor.temperatura_malaga
    to: "unknown"
    for:
      minutes: 30
  actions:
  - action: notify.email_david
    data:
      title: "⚠️ Hidroponico - Sensor del tiempo caído"
      message: >
        El sensor de temperatura de Málaga lleva más de 30 minutos sin datos.
        El riego seguirá funcionando con valores por defecto (2 minutos por ciclo).
        Comprueba la conexión del servidor a Internet.
  mode: single

- id: 'alerta_enchufe_riego_caido'
  alias: Alerta - Enchufe de riego no disponible
  description: Notifica por email si el enchufe deja de responder
  triggers:
  - trigger: state
    entity_id: switch.enchufe_riego_enchufe_1
    to: "unavailable"
    for:
      minutes: 10
  actions:
  - action: notify.email_david
    data:
      title: "🚨 Hidroponico - Enchufe de riego caído"
      message: >
        El enchufe de riego lleva más de 10 minutos sin responder.
        Las plantas NO están siendo regadas. Revisa el enchufe inteligente.
  mode: single

- id: 'resumen_diario_riego'
  alias: Resumen diario del sistema de riego
  description: Email diario a las 21:00 con el estado del sistema
  triggers:
  - trigger: time
    at: "21:00"
  actions:
  - action: notify.email_david
    data:
      title: "🌱 Hidroponico - Resumen diario"
      message: >
        Estado del sistema a las 21:00:

        🌡️ Temperatura Málaga: {{ states('sensor.temperatura_malaga') }}°C
        💧 Humedad: {{ states('sensor.humedad_malaga') }}%
        🌧️ Lluvia: {{ states('sensor.lluvia_malaga') }}mm
        🔌 Enchufe riego: {{ states('switch.enchufe_riego_enchufe_1') }}

        Sistema funcionando con normalidad.
  mode: single

